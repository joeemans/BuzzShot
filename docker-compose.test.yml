services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: buzzshot_test
      POSTGRES_USER: buzzshot
      POSTGRES_PASSWORD: buzzshot
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buzzshot -d buzzshot_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
